name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like and why.

  - type: checkboxes
    id: scope_ack
    attributes:
      label: Before you start
      options:
        - label: "This is a genuine feature request — not an accusation, a complaint about the project/maintainer, or a meta/opinion post. 这是真实的功能建议，不是对项目或维护者的指控、舆论或元讨论帖。"
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what use case does it enable?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work? Include design ideas, commands, UI sketches, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of pikiclaw does this relate to?
      options:
        - Channels (Telegram / Feishu / WeChat)
        - Agent drivers (Claude / Codex / Gemini)
        - Dashboard
        - MCP tools
        - Session management
        - CLI / setup
        - Other
    validations:
      required: true
