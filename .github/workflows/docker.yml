name: Docker

# Builds + publishes the pikiclaw container image to GitHub Container Registry.
#
# Triggers:
#   - push of a `v*` tag         → `:vX.Y.Z` + `:latest` + `:major` + `:minor`
#   - push to `main`             → `:edge` (rolling) for early testers
#   - manual via Actions UI      → use the ref's natural tag set
#
# Platforms: linux/amd64 + linux/arm64. amd64 builds natively on the runner;
# arm64 emulates via QEMU. For a Node image this finishes in well under 15 min
# even with the heavy `npm ci` step.
#
# Auth: GHCR uses the workflow's GITHUB_TOKEN — no extra secrets needed.

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & push
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=pikiclaw
            org.opencontainers.image.description=Layered, open Agent orchestrator — run local coding agents through IM and a web dashboard.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub-hosted cache: free, scoped to this repo, evicts on inactivity.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
