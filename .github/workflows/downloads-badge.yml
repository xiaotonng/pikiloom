name: Refresh download badge

# Recomputes the combined monthly installs (pikiloom + pikiclaw) and updates
# docs/downloads.json, which the README's "installs" badge reads via the
# shields.io endpoint. Commits only when the rounded value changes, and tags the
# commit [skip ci] so it never re-triggers the build matrix.

on:
  schedule:
    - cron: "17 6 * * 1" # weekly · Monday 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - run: node scripts/refresh-download-badge.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- docs/downloads.json; then
            echo "badge unchanged"; exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/downloads.json
          git commit -m "chore(docs): refresh combined download badge [skip ci]"
          git push
