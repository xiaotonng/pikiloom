name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # The reusable core is published alongside pikiloom on every release, for EXTERNAL
      # reuse. pikiloom itself bundles packages/kernel/dist in its own tarball, so this
      # step failing (e.g. @pikiloom scope missing / NPM_TOKEN lacks scope access) must NOT
      # block the release — pikiloom already published and works off the bundled copy.
      - name: Publish @pikiloom/kernel to npm
        continue-on-error: true
        run: |
          npx tsc -p packages/kernel/tsconfig.json
          npm publish ./packages/kernel --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
