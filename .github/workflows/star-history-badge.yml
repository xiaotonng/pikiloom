name: Refresh star history

# Regenerates docs/star-history.svg from the repo's stargazer timestamps, which
# the README's "Star History" chart embeds directly. Self-hosting the SVG avoids
# star-history.com's shared-token rate limits (503 → broken image). Commits only
# when the curve changes, and tags the commit [skip ci] so it never re-triggers
# the build matrix.

on:
  schedule:
    - cron: "23 6 * * 1" # weekly · Monday 06:23 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - run: node scripts/refresh-star-history.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit if changed
        run: |
          if git diff --quiet -- docs/star-history.svg; then
            echo "star history unchanged"; exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/star-history.svg
          git commit -m "chore(docs): refresh star history chart [skip ci]"
          git push
