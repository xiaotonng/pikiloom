<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikiclaw Weekly Release - ZH</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --border: #334155;
            --gradient: linear-gradient(135deg, #0f172a 0%, #020617 100%);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--gradient);
            color: var(--text-main);
            width: 1200px;
            height: 630px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            overflow: hidden;
            position: relative;
        }

        .bg-glow-1 {
            position: absolute;
            top: -150px;
            left: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }
        
        .bg-glow-2 {
            position: absolute;
            bottom: -200px;
            right: -100px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .container {
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 12px;
            background: linear-gradient(to right, #fff, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 24px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            flex-grow: 1;
            align-items: center;
        }

        .metric-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .metric-number {
            font-size: 80px;
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 16px;
            text-shadow: 0 0 20px var(--accent-glow);
        }
        
        .metric-number.purple {
            color: #a855f7;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
        }
        
        .metric-number.green {
            color: #10b981;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .metric-number.yellow {
            color: #fbbf24;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
        }

        .metric-title {
            font-size: 22px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 8px;
        }

        .metric-desc {
            font-size: 16px;
            color: var(--text-muted);
        }

        .footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 24px;
        }

        .version {
            font-size: 18px;
            font-weight: bold;
            color: #e2e8f0;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 8px;
        }

        .npm-command {
            font-family: monospace;
            font-size: 20px;
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px dashed #10b981;
        }
    </style>
</head>
<body>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="container">
        <div class="header">
            <h1>pikiclaw</h1>
            <p>让最好用的 IM 变成你电脑上的顶级 Agent 控制台</p>
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-number">40</div>
                <div class="metric-title">本周发布次数</div>
                <div class="metric-desc">极速迭代，持续进化</div>
            </div>
            
            <div class="metric-card">
                <div class="metric-number purple">3</div>
                <div class="metric-title">大 AI 引擎</div>
                <div class="metric-desc">Claude / Codex / Gemini</div>
            </div>

            <div class="metric-card">
                <div class="metric-number green">2</div>
                <div class="metric-title">大 IM 支持</div>
                <div class="metric-desc">Telegram / 飞书</div>
            </div>

            <div class="metric-card">
                <div class="metric-number yellow">2</div>
                <div class="metric-title">大 GUI 自动化</div>
                <div class="metric-desc">浏览器 / macOS 操控</div>
            </div>
        </div>

        <div class="footer">
            <div class="version">最新版本: v0.2.53</div>
            <div class="npm-command">&gt; npx pikiclaw@latest</div>
        </div>
    </div>
</body>
</html>
