# Pikiloop — docker-compose example
#
# Quick start:
#   1. cp .env.example .env   (then edit credentials — at minimum one IM token
#                              and one agent API key)
#   2. docker compose up -d
#   3. open http://localhost:3939
#
# This file ships an opinionated default: a single `pikiloop` service, two
# named volumes (config + workspace), no host bind-mounts (so it Just Works on
# any host OS). For first-party agent OAuth (browser-based login), uncomment
# the bind mounts that copy `~/.claude`, `~/.codex`, `~/.gemini` from your host.
#
# See docs/DOCKER.md for the full reference.

services:
  pikiloop:
    image: ghcr.io/xiaotonng/pikiloop:latest
    # To build from a checkout instead of pulling, comment `image:` above and
    # uncomment the block below.
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: pikiloop
    restart: unless-stopped
    ports:
      # Web dashboard. Bind to 127.0.0.1 if you don't want it reachable from
      # outside the host (recommended unless you put a reverse proxy in front).
      - "3939:3939"
    environment:
      # ─── Agent API keys (set whichever ones you actually use) ──────────────
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

      # ─── IM channels — provide at least one ────────────────────────────────
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_ALLOWED_CHAT_IDS: ${FEISHU_ALLOWED_CHAT_IDS:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DINGTALK_CLIENT_ID: ${DINGTALK_CLIENT_ID:-}
      DINGTALK_CLIENT_SECRET: ${DINGTALK_CLIENT_SECRET:-}

      # ─── General pikiloop behavior ─────────────────────────────────────────
      DEFAULT_AGENT: ${DEFAULT_AGENT:-claude}
      PIKILOOP_WORKDIR: /workspace
      PIKILOOP_TIMEOUT: ${PIKILOOP_TIMEOUT:-1800}
      PIKILOOP_FULL_ACCESS: ${PIKILOOP_FULL_ACCESS:-true}
      PIKILOOP_ALLOWED_IDS: ${PIKILOOP_ALLOWED_IDS:-}

      # ─── Per-agent tuning (optional) ──────────────────────────────────────
      CLAUDE_MODEL: ${CLAUDE_MODEL:-}
      CLAUDE_PERMISSION_MODE: ${CLAUDE_PERMISSION_MODE:-bypassPermissions}
      CODEX_MODEL: ${CODEX_MODEL:-}
      CODEX_REASONING_EFFORT: ${CODEX_REASONING_EFFORT:-xhigh}
      CODEX_FULL_ACCESS: ${CODEX_FULL_ACCESS:-true}
      GEMINI_MODEL: ${GEMINI_MODEL:-}

      # ─── Browser automation (optional) ─────────────────────────────────────
      # The base image does NOT bundle Chrome. To give the agent a real browser
      # in Docker, run the Chromium sidecar + CDP bridge below and point pikiloop
      # at the bridge endpoint. Setting PIKILOOP_BROWSER_CDP_URL alone turns on
      # browser tooling — no separate PIKILOOP_BROWSER_ENABLED needed.
      # PIKILOOP_BROWSER_CDP_URL: http://chromium:9223

    volumes:
      # setting.json, sessions, MCP/CLI state, etc.
      - pikiloop-config:/home/piki/.pikiloop
      # Projects the agent can read/write. Either a named volume or a host
      # bind mount — the latter is what you want if your code lives on the
      # host and you intend to edit it from the IDE as well.
      - pikiloop-workspace:/workspace
      # Uncomment to reuse a host-side OAuth login for an agent CLI. The host
      # path's uid must match PUID (default 1000) or the agent CLI will refuse
      # to read the token file.
      #
      # ⚠️ Codex stores its state in a SQLite db under ~/.codex/. Mounting the
      # whole dir while the host's Codex desktop is also running can corrupt
      # the db (errno 11 / "database disk image is malformed"). If you only
      # need OAuth, mount just the auth file read-only:
      #     - ${HOME}/.codex/auth.json:/home/piki/.codex/auth.json:ro
      # See docs/DOCKER.md §3-B for full guidance.
      # - ${HOME}/.claude:/home/piki/.claude
      # - ${HOME}/.codex:/home/piki/.codex
      # - ${HOME}/.gemini:/home/piki/.gemini

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3939/api/state"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ─── Optional: Chromium sidecar + CDP bridge for browser automation ─────────
  # Uncomment both services below (and the PIKILOOP_BROWSER_CDP_URL env above) to
  # let the agent drive a real browser. Open http://<host>:3000 in your own
  # browser to sign in to sites — the profile persists in `chromium-config`, and
  # pikiloop attaches over CDP. See docs/DOCKER.md §6 for the full rationale.
  #
  # chromium:
  #   image: lscr.io/linuxserver/chromium:latest
  #   container_name: pikiloop-chromium
  #   restart: unless-stopped
  #   environment:
  #     PUID: 1000
  #     PGID: 1000
  #     TZ: Etc/UTC
  #     # --remote-allow-origins=* is REQUIRED — without it Chrome 111+ rejects
  #     # the cross-host CDP handshake with "403 Forbidden". Note this image
  #     # ignores --remote-debugging-address, so CDP only ever binds to
  #     # 127.0.0.1; the socat bridge below is what exposes it to pikiloop.
  #     CHROME_CLI: "--remote-debugging-port=9222 --remote-allow-origins=*"
  #   ports:
  #     - "3000:3000"   # web UI (KasmVNC) — open this to sign in
  #     - "3001:3001"   # https variant
  #   volumes:
  #     - chromium-config:/config
  #   shm_size: 1gb
  #
  # # Bridges Chrome's localhost-only CDP (127.0.0.1:9222) to 0.0.0.0:9223 inside
  # # the chromium container's network namespace, so pikiloop reaches it at
  # # http://chromium:9223. socat connects from 127.0.0.1, which also satisfies
  # # Chrome's host-header check.
  # chromium-cdp-bridge:
  #   image: alpine/socat:latest
  #   container_name: pikiloop-chromium-cdp-bridge
  #   restart: unless-stopped
  #   network_mode: "service:chromium"
  #   depends_on: [chromium]
  #   command: TCP-LISTEN:9223,fork,reuseaddr,bind=0.0.0.0 TCP:127.0.0.1:9222

volumes:
  pikiloop-config:
  pikiloop-workspace:
  # chromium-config:
